{% extends 'base.html' %}

{% block title %}Owner Login - Go Truf{% endblock %}

{% block extra_head %}
<style>
    .auth-container {
        min-height: calc(100vh - 160px); /* Adjust based on navbar + footer height */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 0;
    }
    .auth-card {
        background: white;
        padding: 2.5rem;
        border-radius: 16px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 450px;
        border: 1px solid #e2e8f0;
    }
    .auth-logo {
        text-align: center;
        margin-bottom: 2rem;
    }
    .auth-logo i {
        font-size: 3rem;
        color: var(--primary-color);
    }
    /* Style Django form elements */
    .auth-card input {
        display: block;
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: var(--text-dark);
        background-color: #f8fafc;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        margin-bottom: 1rem;
    }
    .auth-card input:focus {
        background-color: white;
        border-color: var(--primary-color);
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(37, 99, 235, 0.25);
    }
    .auth-card label {
        display: inline-block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-muted);
    }
    .helptext {
        font-size: 0.85em;
        color: var(--text-muted);
        display: block;
        margin-top: -0.5rem;
        margin-bottom: 1rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="bi bi-person-badge"></i>
            <h2 class="fw-bold mt-2">Owner Login</h2>
            <p class="text-muted">Welcome back! Manage your turfs.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="btn btn-primary w-100 py-2 mt-3 fw-bold">Login</button>
        </form>
        
        <div class="text-center mt-4 pt-3 border-top">
            <p class="text-muted mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-primary text-decoration-none fw-semibold">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
