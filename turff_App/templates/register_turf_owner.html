{% extends 'base.html' %}

{% block title %}Partner with Us - Go Truf{% endblock %}

{% block extra_head %}
<style>
    .auth-container {
        min-height: calc(100vh - 160px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 0; /* A bit more padding for a longer form */
    }
    .auth-card {
        background: white;
        padding: 2.5rem;
        border-radius: 16px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        border: 1px solid #e2e8f0;
    }
    .auth-logo {
        text-align: center;
        margin-bottom: 2rem;
    }
    .auth-logo i {
        font-size: 3rem;
        color: var(--accent-color);
    }
    /* Style Django form elements */
    .auth-card input {
        display: block;
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: var(--text-dark);
        background-color: #f8fafc;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        margin-bottom: 0.5rem;
    }
    .auth-card input:focus {
        background-color: white;
        border-color: var(--primary-color);
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(37, 99, 235, 0.25);
    }
    .auth-card label {
        display: inline-block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-top: 0.5rem;
    }
    .helptext {
        font-size: 0.85em;
        color: var(--text-muted);
        display: block;
        margin-bottom: 1rem;
    }
    ul.errorlist {
        color: #dc3545;
        font-size: 0.875rem;
        padding-left: 1.5rem;
        margin-top: 0.2rem;
        margin-bottom: 1rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="bi bi-shop"></i>
            <h2 class="fw-bold mt-2">Become a Partner</h2>
            <p class="text-muted">Register your turf to start receiving bookings.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="btn btn-primary w-100 py-2 mt-4 fw-bold">Create Account</button>
        </form>
        
        <div class="text-center mt-4 pt-3 border-top">
            <p class="text-muted mb-0">Already have an account? <a href="{% url 'login_turf_owner' %}" class="text-primary text-decoration-none fw-semibold">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
