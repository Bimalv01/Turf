{% extends 'base.html' %}

{% block title %}Add New Turf - Go Truf{% endblock %}

{% block extra_head %}
<style>
    .auth-container {
        min-height: calc(100vh - 160px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 0;
    }
    .auth-card {
        background: white;
        padding: 2.5rem;
        border-radius: 16px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 550px;
        border: 1px solid #e2e8f0;
    }
    /* Style Django form elements */
    .auth-card input, .auth-card select {
        display: block;
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: var(--text-dark);
        background-color: #f8fafc;
        border: 1px solid #dee2e6;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        margin-bottom: 1rem;
    }
    .auth-card input:focus, .auth-card select:focus {
        background-color: white;
        border-color: var(--primary-color);
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(37, 99, 235, 0.25);
    }
    .auth-card label {
        display: inline-block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-muted);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Add New Turf</h2>
            <a href="{% url 'turf_owner_dashboard' %}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-x-lg"></i> Cancel
            </a>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mb-3">
                <label for="images" class="form-label">Turf Images (Multiple)</label>
                <input type="file" name="images" id="images" multiple class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mt-3 fw-bold">
                <i class="bi bi-plus-circle"></i> Create Turf Profile
            </button>
        </form>
    </div>
</div>
{% endblock %}
